<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="aR" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0,0 0,7 8,3.5" fill="#f87171"/>
    </marker>
    <marker id="aB" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0,0 0,7 8,3.5" fill="#60a5fa"/>
    </marker>
    <marker id="aG" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0,0 0,7 8,3.5" fill="#475569"/>
    </marker>
    <linearGradient id="gGas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f2345"/>
      <stop offset="100%" stop-color="#0b1c38"/>
    </linearGradient>
    <linearGradient id="gLiq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06101f"/>
      <stop offset="100%" stop-color="#030b18"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#0b1428"/>

  <!-- Gas phase zone -->
  <rect x="12" y="12" width="936" height="158" rx="9" fill="url(#gGas)" stroke="#1d3a60" stroke-width="1"/>

  <!-- Liquid phase zone -->
  <rect x="12" y="205" width="936" height="303" rx="9" fill="url(#gLiq)" stroke="#1d3a60" stroke-width="1"/>

  <!-- Zone headers -->
  <text x="30" y="35"  fill="#7dd3fc" font-size="9.5" font-weight="700" letter-spacing="2.5" opacity="0.75">GAS PHASE</text>
  <text x="30" y="229" fill="#7dd3fc" font-size="9.5" font-weight="700" letter-spacing="2.5" opacity="0.75">LIQUID PHASE</text>

  <!-- Wavy interface -->
  <path d="M12,176 C50,164 88,188 130,176 C172,164 210,188 252,176 C294,164 332,188 374,176
           C416,164 454,188 496,176 C538,164 576,188 618,176 C660,164 698,188 740,176
           C782,164 820,188 862,176 C900,164 930,188 948,176"
        fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.65"/>
  <text x="480" y="193" fill="#93c5fd" font-size="9" text-anchor="middle" letter-spacing="1.5" opacity="0.6">──  GAS–LIQUID INTERFACE  ──</text>

  <!-- CO2 molecule in gas -->
  <circle cx="74" cy="90" r="30" fill="#3b0606" opacity="0.85"/>
  <circle cx="74" cy="90" r="30" fill="none" stroke="#f87171" stroke-width="1.8" opacity="0.55"/>
  <text x="74" y="97" fill="#fca5a5" font-size="15" font-weight="700" text-anchor="middle">CO₂</text>
  <text x="120" y="76" fill="#f87171" font-size="21" font-weight="700">CO₂</text>
  <text x="120" y="98" fill="#94a3b8" font-size="10">partial pressure  p = 429 ppm  (atmospheric)</text>
  <line x1="74" y1="124" x2="74" y2="166" stroke="#f87171" stroke-width="2.5" marker-end="url(#aR)" opacity="0.8"/>
  <text x="86" y="152" fill="#f87171" font-size="9" opacity="0.65">dissolves</text>

  <!-- O2 molecule in gas -->
  <circle cx="295" cy="90" r="30" fill="#0b1e4a" opacity="0.85"/>
  <circle cx="295" cy="90" r="30" fill="none" stroke="#60a5fa" stroke-width="1.8" opacity="0.55"/>
  <text x="295" y="97" fill="#93c5fd" font-size="15" font-weight="700" text-anchor="middle">O₂</text>
  <text x="342" y="76" fill="#60a5fa" font-size="21" font-weight="700">O₂</text>
  <text x="342" y="98" fill="#94a3b8" font-size="10">partial pressure  p = 20.95 %  (atmospheric)</text>
  <line x1="295" y1="124" x2="295" y2="166" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#aB)" opacity="0.8"/>
  <text x="307" y="152" fill="#60a5fa" font-size="9" opacity="0.65">dissolves</text>

  <!-- Henry Law box -->
  <rect x="558" y="20" width="382" height="144" rx="8"
        fill="rgba(125,211,252,0.05)" stroke="rgba(125,211,252,0.2)" stroke-width="1"/>
  <text x="749" y="44" fill="#7dd3fc" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="1.5" opacity="0.85">HENRY’S LAW</text>
  <text x="749" y="80" fill="#e2e8f0" font-size="19" text-anchor="middle" font-family="Courier New, monospace">[X]aq = Hcc × pX</text>
  <text x="749" y="104" fill="#64748b" font-size="9.5" text-anchor="middle">Hᴀ = dimensionless Henry volatility constant</text>
  <text x="749" y="121" fill="#64748b" font-size="9.5" text-anchor="middle">sets dissolved concentration at the interface</text>
  <text x="749" y="141" fill="#334155" font-size="9.5" text-anchor="middle">Hᴀ,CO₂ = 0.83    Hᴀ,O₂ = 31.4    (25°C, seawater)</text>

  <!-- Liquid: CO2 carbonate chain y=262 -->
  <text x="30"  y="248" fill="#475569" font-size="8.5">from gas phase ↓</text>
  <text x="30"  y="266" fill="#f87171" font-size="14" font-weight="700">CO₂(aq)</text>
  <text x="126" y="266" fill="#334155" font-size="17">⇌</text>
  <text x="152" y="266" fill="#fbbf24" font-size="14" font-weight="700">H₂CO₃</text>
  <text x="242" y="266" fill="#334155" font-size="17">⇌</text>
  <text x="268" y="266" fill="#34d399" font-size="14" font-weight="700">HCO₃⁻</text>
  <text x="362" y="268" fill="#475569" font-size="13">+</text>
  <text x="381" y="266" fill="#f472b6" font-size="14" font-weight="700">H⁺</text>
  <text x="410" y="266" fill="#334155" font-size="17">⇌</text>
  <text x="436" y="266" fill="#a78bfa" font-size="14" font-weight="700">CO₃²⁻</text>
  <text x="527" y="268" fill="#475569" font-size="13">+</text>
  <text x="546" y="266" fill="#f472b6" font-size="14" font-weight="700">H⁺</text>
  <!-- pKa below -->
  <text x="138" y="285" fill="#334155" font-size="8.5" text-anchor="middle">hydration (fast)</text>
  <text x="255" y="285" fill="#334155" font-size="8.5" text-anchor="middle">pKₐ₁ = 6.35</text>
  <text x="423" y="285" fill="#334155" font-size="8.5" text-anchor="middle">pKₐ₂ = 10.33</text>

  <!-- Liquid: O2 row y=325 -->
  <text x="30"  y="313" fill="#475569" font-size="8.5">from gas phase ↓</text>
  <text x="30"  y="331" fill="#60a5fa" font-size="14" font-weight="700">O₂(aq)</text>
  <line x1="108" y1="323" x2="218" y2="323" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aG)"/>
  <text x="226" y="329" fill="#475569" font-size="10" font-style="italic">consumed by SimCells (respiration)</text>

  <!-- Separator -->
  <line x1="20" y1="355" x2="940" y2="355" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="352" fill="#475569" font-size="8" text-anchor="middle" letter-spacing="1">pH-DETERMINING EQUILIBRIA</text>

  <!-- Lactic acid y=396 -->
  <text x="30"  y="396" fill="#fb923c" font-size="14" font-weight="700">H–Lac</text>
  <text x="115" y="396" fill="#334155" font-size="17">⇌</text>
  <text x="141" y="396" fill="#fdba74" font-size="14" font-weight="700">Lac⁻</text>
  <text x="205" y="398" fill="#475569" font-size="13">+</text>
  <text x="224" y="396" fill="#f472b6" font-size="14" font-weight="700">H⁺</text>
  <text x="260" y="396" fill="#334155" font-size="10">pKₐ = 3.86</text>
  <text x="224" y="415" fill="#f472b6" font-size="9" opacity="0.75">releases H⁺ → lowers pH</text>

  <!-- Ammonia y=458 -->
  <text x="30"  y="460" fill="#4ade80" font-size="14" font-weight="700">NH₄⁺</text>
  <text x="115" y="460" fill="#334155" font-size="17">⇌</text>
  <text x="141" y="460" fill="#86efac" font-size="14" font-weight="700">NH₃</text>
  <text x="205" y="462" fill="#475569" font-size="13">+</text>
  <text x="224" y="460" fill="#f472b6" font-size="14" font-weight="700">H⁺</text>
  <text x="260" y="460" fill="#334155" font-size="10">pKₐ = 9.25</text>
  <text x="141" y="479" fill="#86efac" font-size="9" opacity="0.75">crosses membrane freely → available at high pH</text>

  <!-- pH summary box -->
  <rect x="568" y="363" width="378" height="132" rx="8"
        fill="rgba(244,114,182,0.05)" stroke="rgba(244,114,182,0.18)" stroke-width="1"/>
  <text x="757" y="385" fill="#f472b6" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="1.5" opacity="0.9">[H⁺] BALANCE SETS pH</text>
  <text x="584" y="407" fill="#f87171" font-size="10">•  CO₂↑ → H⁺↑ → <tspan fill="#f472b6">pH ↓</tspan></text>
  <text x="584" y="426" fill="#fb923c" font-size="10">•  Lac⁻ production → H⁺↑ → <tspan fill="#f472b6">pH ↓</tspan></text>
  <text x="584" y="445" fill="#4ade80" font-size="10">•  NH₃ cell uptake → NH₄⁺ → NH₃ + H⁺ → <tspan fill="#f472b6">pH ↓</tspan></text>
  <text x="584" y="464" fill="#60a5fa" font-size="10">•  CO₂ out-gassing → H⁺↓ → <tspan fill="#86efac">pH ↑</tspan></text>
  <text x="757" y="487" fill="#475569" font-size="9" text-anchor="middle">→ gas transfer controls pH → sets NH₃ availability → arginine yield</text>

</svg>
