<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="aR" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 0,8 9,4" fill="#f87171"/>
    </marker>
    <marker id="aB" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 0,8 9,4" fill="#60a5fa"/>
    </marker>
    <marker id="aG" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 0,8 9,4" fill="#475569"/>
    </marker>
    <linearGradient id="gGas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f2345"/>
      <stop offset="100%" stop-color="#0b1c38"/>
    </linearGradient>
    <linearGradient id="gLiq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06101f"/>
      <stop offset="100%" stop-color="#030b18"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="640" fill="#0b1428"/>

  <!-- Gas phase zone -->
  <rect x="12" y="12" width="1076" height="192" rx="10" fill="url(#gGas)" stroke="#1d3a60" stroke-width="1.2"/>

  <!-- Liquid phase zone -->
  <rect x="12" y="232" width="1076" height="396" rx="10" fill="url(#gLiq)" stroke="#1d3a60" stroke-width="1.2"/>

  <!-- Zone headers -->
  <text x="34" y="40"  fill="#7dd3fc" font-size="13" font-weight="700" letter-spacing="3" opacity="0.8">GAS PHASE</text>
  <text x="34" y="260" fill="#7dd3fc" font-size="13" font-weight="700" letter-spacing="3" opacity="0.8">LIQUID PHASE</text>

  <!-- Wavy interface -->
  <path d="M12,210 C55,196 100,224 150,210 C200,196 245,224 295,210 C345,196 390,224 440,210
           C490,196 535,224 585,210 C635,196 680,224 730,210 C780,196 825,224 875,210
           C925,196 970,224 1020,210 C1060,196 1082,218 1088,210"
        fill="none" stroke="#93c5fd" stroke-width="2.2" opacity="0.65"/>
  <text x="550" y="226" fill="#93c5fd" font-size="11" text-anchor="middle" letter-spacing="2" opacity="0.65">──  GAS–LIQUID INTERFACE  ──</text>

  <!-- CO2 molecule circle -->
  <circle cx="80" cy="106" r="36" fill="#3b0606" opacity="0.85"/>
  <circle cx="80" cy="106" r="36" fill="none" stroke="#f87171" stroke-width="2" opacity="0.55"/>
  <text x="80" y="114" fill="#fca5a5" font-size="17" font-weight="700" text-anchor="middle">CO₂</text>
  <!-- CO2 label -->
  <text x="132" y="90"  fill="#f87171" font-size="26" font-weight="700">CO₂</text>
  <text x="132" y="116" fill="#94a3b8" font-size="13">partial pressure  p = 429 ppm  (atmospheric)</text>
  <!-- arrow down -->
  <line x1="80" y1="146" x2="80" y2="198" stroke="#f87171" stroke-width="3" marker-end="url(#aR)" opacity="0.8"/>
  <text x="96" y="180" fill="#f87171" font-size="11" opacity="0.7">dissolves</text>

  <!-- O2 molecule circle -->
  <circle cx="340" cy="106" r="36" fill="#0b1e4a" opacity="0.85"/>
  <circle cx="340" cy="106" r="36" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.55"/>
  <text x="340" y="114" fill="#93c5fd" font-size="17" font-weight="700" text-anchor="middle">O₂</text>
  <!-- O2 label -->
  <text x="392" y="90"  fill="#60a5fa" font-size="26" font-weight="700">O₂</text>
  <text x="392" y="116" fill="#94a3b8" font-size="13">partial pressure  p = 20.95 %  (atmospheric)</text>
  <!-- arrow down -->
  <line x1="340" y1="146" x2="340" y2="198" stroke="#60a5fa" stroke-width="3" marker-end="url(#aB)" opacity="0.8"/>
  <text x="356" y="180" fill="#60a5fa" font-size="11" opacity="0.7">dissolves</text>

  <!-- Henry Law box -->
  <rect x="634" y="20" width="446" height="178" rx="9"
        fill="rgba(125,211,252,0.05)" stroke="rgba(125,211,252,0.22)" stroke-width="1.2"/>
  <text x="857" y="48" fill="#7dd3fc" font-size="13" text-anchor="middle" font-weight="700" letter-spacing="2" opacity="0.9">HENRY'S LAW</text>
  <text x="857" y="90" fill="#e2e8f0" font-size="22" text-anchor="middle" font-family="Courier New, monospace">[X]aq  =  Hcc  x  pX</text>
  <text x="857" y="118" fill="#64748b" font-size="12" text-anchor="middle">Hcc = dimensionless Henry volatility constant</text>
  <text x="857" y="138" fill="#64748b" font-size="12" text-anchor="middle">sets dissolved concentration at the interface</text>
  <text x="857" y="162" fill="#334155" font-size="12" text-anchor="middle">Hcc,CO2 = 0.83     Hcc,O2 = 31.4    (25 C, seawater)</text>

  <!-- Liquid: CO2 carbonate chain -->
  <text x="34"  y="295" fill="#475569" font-size="11">from gas phase ↓</text>
  <text x="34"  y="320" fill="#f87171"  font-size="18" font-weight="700">CO₂(aq)</text>
  <text x="150" y="320" fill="#334155"  font-size="22">⇌</text>
  <text x="180" y="320" fill="#fbbf24"  font-size="18" font-weight="700">H₂CO₃</text>
  <text x="298" y="320" fill="#334155"  font-size="22">⇌</text>
  <text x="328" y="320" fill="#34d399"  font-size="18" font-weight="700">HCO₃⁻</text>
  <text x="446" y="322" fill="#475569"  font-size="17">+</text>
  <text x="467" y="320" fill="#f472b6"  font-size="18" font-weight="700">H⁺</text>
  <text x="504" y="320" fill="#334155"  font-size="22">⇌</text>
  <text x="534" y="320" fill="#a78bfa"  font-size="18" font-weight="700">CO₃²⁻</text>
  <text x="652" y="322" fill="#475569"  font-size="17">+</text>
  <text x="673" y="320" fill="#f472b6"  font-size="18" font-weight="700">H⁺</text>
  <!-- pKa below chain -->
  <text x="164" y="344" fill="#334155" font-size="11" text-anchor="middle">hydration (fast)</text>
  <text x="313" y="344" fill="#334155" font-size="11" text-anchor="middle">pKa1 = 6.35</text>
  <text x="520" y="344" fill="#334155" font-size="11" text-anchor="middle">pKa2 = 10.33</text>

  <!-- Liquid: O2 row -->
  <text x="34"  y="382" fill="#475569" font-size="11">from gas phase ↓</text>
  <text x="34"  y="407" fill="#60a5fa" font-size="18" font-weight="700">O₂(aq)</text>
  <line x1="132" y1="397" x2="268" y2="397" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aG)"/>
  <text x="280" y="404" fill="#475569" font-size="13" font-style="italic">consumed by SimCells (respiration)</text>

  <!-- Separator -->
  <line x1="20" y1="434" x2="1080" y2="434" stroke="#1e3a5f" stroke-width="1.2" stroke-dasharray="7,5"/>
  <text x="550" y="430" fill="#475569" font-size="10.5" text-anchor="middle" letter-spacing="1.5">pH-DETERMINING EQUILIBRIA</text>

  <!-- Lactic acid -->
  <text x="34"  y="474" fill="#fb923c" font-size="18" font-weight="700">H-Lac</text>
  <text x="140" y="474" fill="#334155" font-size="22">⇌</text>
  <text x="170" y="474" fill="#fdba74" font-size="18" font-weight="700">Lac⁻</text>
  <text x="246" y="476" fill="#475569" font-size="17">+</text>
  <text x="267" y="474" fill="#f472b6" font-size="18" font-weight="700">H⁺</text>
  <text x="312" y="474" fill="#334155" font-size="13">pKa = 3.86</text>
  <text x="267" y="498" fill="#f472b6" font-size="12" opacity="0.8">releases H⁺  →  lowers pH</text>

  <!-- Ammonia -->
  <text x="34"  y="548" fill="#4ade80" font-size="18" font-weight="700">NH₄⁺</text>
  <text x="140" y="548" fill="#334155" font-size="22">⇌</text>
  <text x="170" y="548" fill="#86efac" font-size="18" font-weight="700">NH₃</text>
  <text x="246" y="550" fill="#475569" font-size="17">+</text>
  <text x="267" y="548" fill="#f472b6" font-size="18" font-weight="700">H⁺</text>
  <text x="312" y="548" fill="#334155" font-size="13">pKa = 9.25</text>
  <text x="170" y="572" fill="#86efac" font-size="12" opacity="0.8">neutral — crosses cell membrane freely  →  available at higher pH</text>

  <!-- pH summary box -->
  <rect x="630" y="442" width="450" height="184" rx="9"
        fill="rgba(244,114,182,0.05)" stroke="rgba(244,114,182,0.2)" stroke-width="1.2"/>
  <text x="855" y="468" fill="#f472b6" font-size="13" text-anchor="middle" font-weight="700" letter-spacing="2" opacity="0.95">[H+] BALANCE SETS pH</text>
  <text x="648" y="496" fill="#f87171"  font-size="13">•  CO₂ ↑   →   H⁺ ↑   →   <tspan fill="#f472b6">pH ↓</tspan></text>
  <text x="648" y="520" fill="#fb923c"  font-size="13">•  Lac⁻ production   →   H⁺ ↑   →   <tspan fill="#f472b6">pH ↓</tspan></text>
  <text x="648" y="544" fill="#4ade80"  font-size="13">•  NH₃ uptake by cells   →   H⁺ ↑   →   <tspan fill="#f472b6">pH ↓</tspan></text>
  <text x="648" y="568" fill="#60a5fa"  font-size="13">•  CO₂ out-gassing   →   H⁺ ↓   →   <tspan fill="#86efac">pH ↑</tspan></text>
  <text x="855" y="610" fill="#475569" font-size="11.5" text-anchor="middle">gas transfer controls pH  →  sets NH₃ availability  →  arginine yield</text>

</svg>
