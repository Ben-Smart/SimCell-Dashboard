<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1020"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0,0 0,9 10,4.5" fill="#f87171"/>
    </marker>
    <marker id="aB" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0,0 0,9 10,4.5" fill="#60a5fa"/>
    </marker>
    <marker id="aG" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0,0 0,9 10,4.5" fill="#475569"/>
    </marker>
    <linearGradient id="gGas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f2345"/>
      <stop offset="100%" stop-color="#0b1c38"/>
    </linearGradient>
    <linearGradient id="gLiq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06101f"/>
      <stop offset="100%" stop-color="#030b18"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="1020" fill="#0b1428"/>

  <!-- Gas phase zone -->
  <rect x="12" y="12" width="1076" height="208" rx="10" fill="url(#gGas)" stroke="#1d3a60" stroke-width="1.5"/>

  <!-- Liquid phase zone -->
  <rect x="12" y="248" width="1076" height="760" rx="10" fill="url(#gLiq)" stroke="#1d3a60" stroke-width="1.5"/>

  <!-- Zone headers -->
  <text x="34" y="46"  fill="#7dd3fc" font-size="18" font-weight="700" letter-spacing="3" opacity="0.8">GAS PHASE</text>
  <text x="34" y="284" fill="#7dd3fc" font-size="18" font-weight="700" letter-spacing="3" opacity="0.8">LIQUID PHASE</text>

  <!-- Wavy interface -->
  <path d="M12,226 C55,210 100,242 155,226 C210,210 255,242 310,226 C365,210 410,242 465,226
           C520,210 565,242 620,226 C675,210 720,242 775,226 C830,210 875,242 930,226
           C985,210 1030,242 1080,226 C1085,215 1088,230 1088,226"
        fill="none" stroke="#93c5fd" stroke-width="2.5" opacity="0.65"/>
  <text x="550" y="243" fill="#93c5fd" font-size="14" text-anchor="middle" letter-spacing="2" opacity="0.65">──  GAS–LIQUID INTERFACE  ──</text>

  <!-- CO2 -->
  <circle cx="90" cy="118" r="44" fill="#3b0606" opacity="0.85"/>
  <circle cx="90" cy="118" r="44" fill="none" stroke="#f87171" stroke-width="2.5" opacity="0.55"/>
  <text x="90" y="127" fill="#fca5a5" font-size="22" font-weight="700" text-anchor="middle">CO₂</text>
  <text x="150" y="104" fill="#f87171" font-size="34" font-weight="700">CO₂</text>
  <line x1="90" y1="166" x2="90" y2="216" stroke="#f87171" stroke-width="3.5" marker-end="url(#aR)" opacity="0.8"/>
  <text x="108" y="200" fill="#f87171" font-size="14" opacity="0.7">dissolves</text>

  <!-- O2 -->
  <circle cx="390" cy="118" r="44" fill="#0b1e4a" opacity="0.85"/>
  <circle cx="390" cy="118" r="44" fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.55"/>
  <text x="390" y="127" fill="#93c5fd" font-size="22" font-weight="700" text-anchor="middle">O₂</text>
  <text x="450" y="104" fill="#60a5fa" font-size="34" font-weight="700">O₂</text>
  <line x1="390" y1="166" x2="390" y2="216" stroke="#60a5fa" stroke-width="3.5" marker-end="url(#aB)" opacity="0.8"/>
  <text x="408" y="200" fill="#60a5fa" font-size="14" opacity="0.7">dissolves</text>

  <!-- CO2 carbonate chain -->
  <text x="34"  y="328" fill="#64748b" font-size="20">from gas phase ↓</text>
  <text x="34"  y="374" fill="#f87171"  font-size="32" font-weight="700">CO₂(aq)</text>
  <text x="218" y="374" fill="#334155"  font-size="38">⇌</text>
  <text x="264" y="374" fill="#fbbf24"  font-size="32" font-weight="700">H₂CO₃</text>
  <text x="456" y="374" fill="#334155"  font-size="38">⇌</text>
  <text x="502" y="374" fill="#34d399"  font-size="32" font-weight="700">HCO₃⁻</text>
  <text x="686" y="378" fill="#64748b"  font-size="30">+</text>
  <text x="716" y="374" fill="#f472b6"  font-size="32" font-weight="700">H⁺</text>
  <text x="766" y="374" fill="#334155"  font-size="38">⇌</text>
  <text x="812" y="374" fill="#a78bfa"  font-size="32" font-weight="700">CO₃²⁻</text>
  <text x="990" y="378" fill="#64748b"  font-size="30">+</text>
  <text x="1020" y="374" fill="#f472b6"  font-size="32" font-weight="700">H⁺</text>
  <!-- pKa -->
  <text x="240" y="408" fill="#475569" font-size="20" text-anchor="middle">hydration (fast)</text>
  <text x="479" y="408" fill="#475569" font-size="20" text-anchor="middle">pKa1 = 6.35</text>
  <text x="789" y="408" fill="#475569" font-size="20" text-anchor="middle">pKa2 = 10.33</text>

  <!-- O2 row -->
  <text x="34"  y="464" fill="#64748b" font-size="20">from gas phase ↓</text>
  <text x="34"  y="506" fill="#60a5fa" font-size="32" font-weight="700">O₂(aq)</text>
  <line x1="196" y1="490" x2="380" y2="490" stroke="#334155" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#aG)"/>
  <text x="396" y="502" fill="#64748b" font-size="24" font-style="italic">consumed by SimCells (respiration)</text>

  <!-- Separator -->
  <line x1="20" y1="546" x2="1080" y2="546" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="550" y="540" fill="#475569" font-size="19" text-anchor="middle" letter-spacing="2">pH-DETERMINING EQUILIBRIA</text>

  <!-- Lactic acid -->
  <text x="34"  y="610" fill="#fb923c" font-size="32" font-weight="700">H-Lac</text>
  <text x="214" y="610" fill="#334155" font-size="38">⇌</text>
  <text x="260" y="610" fill="#fdba74" font-size="32" font-weight="700">Lac⁻</text>
  <text x="390" y="614" fill="#64748b" font-size="30">+</text>
  <text x="422" y="610" fill="#f472b6" font-size="32" font-weight="700">H⁺</text>
  <text x="480" y="610" fill="#475569" font-size="22">pKa = 3.86</text>
  <text x="422" y="648" fill="#f472b6" font-size="22" opacity="0.85">releases H⁺  →  lowers pH</text>

  <!-- Ammonia -->
  <text x="34"  y="740" fill="#4ade80" font-size="32" font-weight="700">NH₄⁺</text>
  <text x="214" y="740" fill="#334155" font-size="38">⇌</text>
  <text x="260" y="740" fill="#86efac" font-size="32" font-weight="700">NH₃</text>
  <text x="390" y="744" fill="#64748b" font-size="30">+</text>
  <text x="422" y="740" fill="#f472b6" font-size="32" font-weight="700">H⁺</text>
  <text x="480" y="740" fill="#475569" font-size="22">pKa = 9.25</text>
  <text x="260" y="778" fill="#86efac" font-size="22" opacity="0.85">neutral — crosses membrane freely  →  available at higher pH</text>

  <!-- pH summary box -->
  <rect x="34" y="836" width="1040" height="172" rx="10"
        fill="rgba(244,114,182,0.06)" stroke="rgba(244,114,182,0.22)" stroke-width="1.5"/>
  <text x="554" y="866" fill="#f472b6" font-size="22" text-anchor="middle" font-weight="700" letter-spacing="2" opacity="0.95">[H+] BALANCE SETS pH</text>
  <text x="54" y="900"  fill="#f87171" font-size="22">•  CO₂ ↑  →  H⁺ ↑  →  <tspan fill="#f472b6">pH ↓</tspan>          <tspan fill="#60a5fa">•  CO₂ out-gassing  →  H⁺ ↓  →  </tspan><tspan fill="#86efac">pH ↑</tspan></text>
  <text x="54" y="936"  fill="#fb923c" font-size="22">•  Lac⁻ production  →  H⁺ ↑  →  <tspan fill="#f472b6">pH ↓</tspan></text>
  <text x="54" y="972"  fill="#4ade80" font-size="22">•  NH₃ uptake by cells  →  NH₄⁺ → NH₃ + H⁺  →  <tspan fill="#f472b6">pH ↓</tspan>     <tspan fill="#94a3b8" font-size="19">gas transfer controls pH → NH₃ availability → arginine yield</tspan></text>

</svg>
